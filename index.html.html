function showDetail(id){

  const e=elek.find(x=>x.id===id);
  rotKampas=e.kampas;
  document.getElementById('ptitle').textContent=e.name.toUpperCase()+' · '+e.vietove.toUpperCase();
  setActive('b-elek');
  const C=document.getElementById('content');
  const pct=(v,min,max)=>((v-min)/(max-min)*100).toFixed(1)+'%';

  C.innerHTML=`
    <div class="dtopbar">
      <button class="back-btn" onclick="go('elektrines')">← Atgal</button>
      <div>
        <div class="dt-title">${e.name}</div>
        <div class="dt-loc">📍 ${e.vietove} · GPIO 4/5/6/7</div>
      </div>
      <div class="spill ${e.status}">${e.status.toUpperCase()}</div>
    </div>

    <div class="istrip">
      <div class="ib cg"><div class="ib-lbl">GALIA</div><div><span class="ib-val">${e.galia}</span><span class="ib-unit">kW</span></div></div>
      <div class="ib cb"><div class="ib-lbl">TEMPERATŪRA</div><div><span class="ib-val">${e.temp}</span><span class="ib-unit">°C</span></div></div>
      <div class="ib ca"><div class="ib-lbl">APKROVA</div><div><span class="ib-val">${e.apkrova}</span><span class="ib-unit">%</span></div></div>
      <div class="ib cg"><div class="ib-lbl">MAKS. VĖJAS</div><div><span class="ib-val" id="vejD">${e.maxVejas}</span><span class="ib-unit">m/s</span></div></div>
    </div>

    <div class="dcols">
      <div class="sblock">
        <div class="sblock-head">⚙ NUSTATYMAI</div>
        <div class="param">
          <div class="param-top"><span class="pname">Jautrumas</span><span class="pbadge g"><span id="jV">${e.jautrumas}</span>%</span></div>
          <input type="range" class="sl g" min="1" max="100" value="${e.jautrumas}" style="--p:${pct(e.jautrumas,1,100)}" oninput="upd(this,'jV',1,100)">
          <div class="plims"><span>1 silpnas</span><span>100 stiprus</span></div>
        </div>
        <div class="param">
          <div class="param-top"><span class="pname">Uždelsimas</span><span class="pbadge b"><span id="uV">${e.uzdelsimasSek}</span>s</span></div>
          <input type="range" class="sl b" min="1" max="500" value="${e.uzdelsimasSek}" style="--p:${pct(e.uzdelsimasSek,1,500)}" oninput="upd(this,'uV',1,500)">
          <div class="plims"><span>1s</span><span>500s</span></div>
        </div>
        <div class="param">
          <div class="param-top"><span class="pname">Info rinkimas</span><span class="pbadge p"><span id="iV">${e.infoMin}</span>min</span></div>
          <input type="range" class="sl p" min="1" max="10" value="${e.infoMin}" style="--p:${pct(e.infoMin,1,10)}" oninput="upd(this,'iV',1,10)">
          <div class="plims"><span>1 min</span><span>10 min</span></div>
        </div>
        <div class="param">
          <div class="param-top"><span class="pname">Maks. vėjas</span><span class="pbadge a"><span id="vV">${e.maxVejas}</span>m/s</span></div>
          <input type="range" class="sl a" min="5" max="40" value="${e.maxVejas}" style="--p:${pct(e.maxVejas,5,40)}" oninput="updV(this)">
          <div class="plims"><span>5 m/s</span><span>40 m/s</span></div>
        </div>
        <div class="save-row">
          <button class="sbtn" onclick="save()">💾 Išsaugoti</button>
          <span class="ok-msg" id="okMsg">✓ Išsaugota</span>
        </div>
      </div>

      <div class="rblock">
        <div class="rblock-head">
          <span>🎯 VALDYMAS</span>
          <span id="rezB" style="font-size:9px;padding:2px 8px;border-radius:99px;background:${e.rankinis?'rgba(245,158,11,0.15)':'rgba(59,130,246,0.15)'};color:${e.rankinis?'var(--accent3)':'var(--accent2)'}">
            ${e.rankinis?'RANKINIS':'AUTO'}
          </span>
        </div>
        <div class="mode-row">
          <button class="mpill ${e.rankinis?'':'auto-on'}" id="pA" onclick="setRez('auto')">⚙ Automatinis</button>
          <button class="mpill ${e.rankinis?'man-on':''}" id="pM" onclick="setRez('rankinis')">✋ Rankinis</button>
        </div>
        <div id="autoInfo" style="display:${e.rankinis?'none':'block'}" class="auto-info">
          Elektrinė automatiškai seka saulę pagal 4 fotodiodų signalus.<br><br>
          Kampas atnaujinamas kas <b id="aiMin">${e.infoMin}</b> min.
        </div>
        <div id="manCtrl" style="display:${e.rankinis?'flex':'none'};flex-direction:column;gap:10px">
          <div class="ctrl-area">
            <div>
              <svg id="rotSvg" width="80" height="80" viewBox="0 0 80 80" style="transform:rotate(${rotKampas}deg);transition:transform 0.04s linear">
                <circle cx="40" cy="40" r="36" fill="none" stroke="rgba(99,179,237,0.1)" stroke-width="8" stroke-dasharray="3 7"/>
                <circle cx="40" cy="40" r="5" fill="var(--accent3)" opacity="0.9"/>
                <line x1="40" y1="35" x2="40" y2="10" stroke="var(--accent3)" stroke-width="3.5" stroke-linecap="round"/>
                <line x1="33" y1="45" x2="13" y2="63" stroke="var(--accent3)" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
                <line x1="47" y1="45" x2="67" y2="63" stroke="var(--accent3)" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
                <polygon points="40,5 37,12 43,12" fill="var(--accent)" opacity="0.5"/>
              </svg>
              <div class="deg-badge"><span id="degD">${rotKampas}</span>°</div>
            </div>
            <div class="rbtns">
              <button class="rbtn" id="bL" onmousedown="startR(-1)" onmouseup="stopR()" onmouseleave="stopR()" ontouchstart="startR(-1)" ontouchend="stopR()">← Kairė</button>
              <button class="rbtn" id="bR" onmousedown="startR(1)" onmouseup="stopR()" onmouseleave="stopR()" ontouchstart="startR(1)" ontouchend="stopR()">Dešinė →</button>
              <div class="rbtn-hint">Laikykite nuspaustą</div>
            </div>
          </div>
        </div>
      </div>
    </div>`;
}

function upd(el,id,min,max){
  const v=parseInt(el.value);
  document.getElementById(id).textContent=v;
  el.style.setProperty('--p',((v-min)/(max-min)*100).toFixed(1)+'%');
  if(id==='iV'){const a=document.getElementById('aiMin');if(a)a.textContent=v;}
}
function updV(el){
  const v=parseInt(el.value);
  document.getElementById('vV').textContent=v;
  document.getElementById('vejD').textContent=v;
  el.style.setProperty('--p',((v-5)/35*100).toFixed(1)+'%');
}
function setRez(r){
  const m=r==='rankinis';
  document.getElementById('pA').className='mpill'+(m?'':' auto-on');
  document.getElementById('pM').className='mpill'+(m?' man-on':'');
  document.getElementById('autoInfo').style.display=m?'none':'block';
  document.getElementById('manCtrl').style.display=m?'flex':'none';
  const b=document.getElementById('rezB');
  b.textContent=m?'RANKINIS':'AUTO';
  b.style.background=m?'rgba(245,158,11,0.15)':'rgba(59,130,246,0.15)';
  b.style.color=m?'var(--accent3)':'var(--accent2)';
  if(!m)stopR();
}
function startR(dir){
  stopR();
  document.getElementById(dir===-1?'bL':'bR')?.classList.add('pressing');
  rotInt=setInterval(()=>{
    rotKampas=(rotKampas+dir*2+360)%360;
    const s=document.getElementById('rotSvg'),d=document.getElementById('degD');
    if(s)s.style.transform=`rotate(${rotKampas}deg)`;
    if(d)d.textContent=Math.round(rotKampas);
  },30);
}
function stopR(){
  if(rotInt){clearInterval(rotInt);rotInt=null;}
  document.getElementById('bL')?.classList.remove('pressing');
  document.getElementById('bR')?.classList.remove('pressing');
}
function save(){
  const m=document.getElementById('okMsg');
  if(m){m.classList.add('show');setTimeout(()=>m.classList.remove('show'),2500);}
}

function humStatus(h){
  if(h<30)return{txt:'Sausa',col:'#f87171'};
  if(h<50)return{txt:'Normalu',col:'var(--accent)'};
  if(h<70)return{txt:'Komfortiška',col:'var(--accent2)'};
  if(h<85)return{txt:'Drėgna',col:'var(--accent3)'};
  return{txt:'Labai drėgna',col:'#f87171'};
}

      </div>

        <div class="dregme-head">DRĖGMĖ</div>

              <div class="dmeta-row"><span class="dmeta-lbl">Vidurkis</span><span class="dmeta-val">61%</span></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="grafikai">
      <div class="gchart">
        <div class="gchart-head"><span>SAVAITĖS TEMPERATŪRA</span><span class="gchart-badge temp">°C</span></div>
        <svg class="chart-svg" viewBox="0 0 240 90" height="88">
          <defs>
            <linearGradient id="gt" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#f87171" stop-opacity="0.4"/>
              <stop offset="100%" stop-color="#f87171" stop-opacity="0"/>

          ${[0,25,50,75].map(y=>`<line class="grid-line" x1="30" y1="${y}" x2="240" y2="${y}"/>`).join('')}
          <text class="axis-lbl" x="0" y="4">26°</text><text class="axis-lbl" x="0" y="29">22°</text>
          <text class="axis-lbl" x="0" y="54">18°</text><text class="axis-lbl" x="0" y="79">14°</text>
          ${dienos.map((d,i)=>`<text class="axis-lbl" text-anchor="middle" x="${30+i*30+15}" y="88">${d}</text>`).join('')}
          <path fill="url(#gt)" opacity="0.3" d="M${tpts} L${lx},75 L${fx},75 Z"/>

go('dashboard');
</script>
